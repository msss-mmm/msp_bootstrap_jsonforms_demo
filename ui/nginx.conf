

# Use a map for cleaner logic (place this above the 'server' block)
map $http_x_forwarded_prefix $app_base {
    ""          "/";
    "/"         "/";
    default     $http_x_forwarded_prefix;
}

server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        # Inject the dynamically determined base
        sub_filter 'BASE_URL_PLACEHOLDER' '$app_base';
        sub_filter_once on;
        sub_filter_types text/html;

        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the api service
    location ~ ^(/.*)?/api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass the subpath prefix if present
        proxy_set_header X-Forwarded-Prefix $http_x_forwarded_prefix;

        # Strip any subpath before /api
        rewrite ^.*(/api/.*)$ $1 break;
    }
}

