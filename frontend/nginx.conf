server {
    listen       80;
    server_name  localhost;

    # The subpath will be handled by Vite build --base during the build stage.
    # We just need to ensure that the SPA routing works.

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # This replaces the placeholder in index.html with the actual subpath
        # provided by the X-Forwarded-Prefix header if present, or / otherwise.
        # We need to use sub_filter for this.
        set $app_base /;
        if ($http_x_forwarded_prefix != "") {
            set $app_base $http_x_forwarded_prefix;
        }

        # Ensure we have a trailing slash if it's not empty
        # but we need to be careful with the trailing slash for window._APP_BASE_
        # Actually it's better to ensure it's exactly what's in the header or /

        sub_filter 'BASE_URL_PLACEHOLDER' '$app_base';
        sub_filter_once on;
        sub_filter_types text/html;

        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend service
    location /api {
        proxy_pass http://backend:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix $http_x_forwarded_prefix;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
