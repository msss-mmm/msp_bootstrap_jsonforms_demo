

# Use a map for cleaner logic (place this above the 'server' block)
map $http_x_forwarded_prefix $app_base {
    ""          "/";
    "/"         "/";
    default     $http_x_forwarded_prefix;
}

server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        # Inject the dynamically determined base
        sub_filter 'BASE_URL_PLACEHOLDER' '$app_base';
        sub_filter_once on;
        sub_filter_types text/html;

        try_files $uri $uri/ /index.html;
    }
}

