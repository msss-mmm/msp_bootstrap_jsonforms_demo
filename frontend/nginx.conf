server {
    listen       80;
    server_name  localhost;

    # The subpath will be handled by Vite build --base during the build stage.
    # We just need to ensure that the SPA routing works.

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API proxy if needed directly at the frontend level
    # location /api {
    #     proxy_pass http://backend:8000/api;
    # }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
