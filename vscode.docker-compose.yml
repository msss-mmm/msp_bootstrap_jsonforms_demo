services:
  vscode:
    image: codercom/code-server:latest
    user: "root"
    ports:
      - "4000:8443"
    volumes:
      - ./api/templates:/home/coder/project/templates
      - ./api/documents:/home/coder/project/documents
      - vscode_config:/home/coder/.local/share/code-server
    environment:
      - AUTH=none
    entrypoint: ["/bin/sh", "-c", "chown -R coder:coder /home/coder && exec su coder -c 'code-server --install-extension miragon-gmbh.miranum-json-forms || true; exec code-server --auth none --bind-addr 0.0.0.0:8443 /home/coder/project'"]
    command: []

networks:
  default:
    name: "${NETWORK:-dms_network}"

volumes:
  vscode_config:
