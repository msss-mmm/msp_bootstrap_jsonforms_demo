services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./api:/app
    command: "python manage.py runserver 0.0.0.0:${BACKEND_PORT}"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.frontend
      args:
        - VITE_APP_TITLE=${VITE_APP_TITLE:-App}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./api/templates:/app/api/templates
      - ./api/documents:/app/api/documents


networks:
  default:
    name: "${NETWORK:-dms_network}"

