services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: "python manage.py runserver 0.0.0.0:${BACKEND_PORT}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - VITE_APP_TITLE=${VITE_APP_TITLE:-App}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    env_file:
      - .env
    depends_on:
      - backend

networks:
  default:
    name: dms_network
